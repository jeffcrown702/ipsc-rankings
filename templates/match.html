<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPSC 排名 - 比賽</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #222;
        }
        .header {
            background: #1a1a2e;
            color: #fff;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header a { color: #aaa; text-decoration: none; font-size: 13px; }
        .header a:hover { color: #fff; }
        .header h2 { font-size: 18px; font-weight: 600; flex: 1; }
        .container { max-width: 1000px; margin: 0 auto; padding: 12px 16px; }

        /* Division 導覽列 */
        .div-nav {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .div-nav::-webkit-scrollbar { height: 3px; }
        .div-nav::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .div-btn {
            padding: 8px 18px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .div-btn:hover { border-color: #1a1a2e; }
        .div-btn.active {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }

        /* 頁籤導覽 */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #1a1a2e;
            margin-bottom: 16px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #eee;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px 6px 0 0;
            margin-right: 2px;
        }
        .tab-btn:hover { background: #ddd; }
        .tab-btn.active {
            background: #1a1a2e;
            color: #fff;
        }

        /* 表格 */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        table.ranking {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 680px;
        }
        table.ranking thead th {
            background: #1a1a2e;
            color: #fff;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        table.ranking tbody td {
            padding: 9px 8px;
            border-bottom: 1px solid #eee;
            background: #fff;
            color: #222;
        }
        table.ranking tbody tr:hover td { background: #f0f4ff; }
        table.ranking tbody tr:nth-child(even) td { background: #fafafa; }
        table.ranking tbody tr:nth-child(even):hover td { background: #f0f4ff; }
        .place-1 { font-weight: 700; color: #b8860b; }
        .place-2 { font-weight: 600; color: #666; }
        .place-3 { font-weight: 600; color: #8b4513; }
        .cat-title {
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0 8px;
            color: #1a1a2e;
            padding: 8px 12px;
            background: #e8e8f0;
            border-radius: 6px;
        }
        .cat-title:first-child { margin-top: 0; }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        /* Stage 選單 */
        .stage-select {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .stage-btn {
            padding: 6px 14px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stage-btn:hover { border-color: #1a1a2e; }
        .stage-btn.active {
            background: #1a1a2e;
            color: #fff;
            border-color: #1a1a2e;
        }

        .loading { text-align: center; padding: 40px; color: #888; }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .no-data { text-align: center; padding: 40px; color: #999; }

        .btn-scrape {
            padding: 6px 16px;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-scrape:hover { opacity: 0.85; }
        .spinner-sm {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid #aaa;
            border-top-color: #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .rank-info {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .header h2 { font-size: 15px; }
            .tab-btn { padding: 8px 14px; font-size: 12px; }
            .div-btn { padding: 6px 14px; font-size: 12px; }
            table.ranking { font-size: 12px; min-width: 620px; }
            table.ranking thead th, table.ranking tbody td { padding: 7px 5px; }
            .container { padding: 8px 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← 比賽列表</a>
        <h2 id="matchTitle">載入中...</h2>
        <button class="btn-scrape" onclick="scrapeMatch()">📡 爬取最新數據</button>
    </div>
    <div class="container">
        <div class="error-box" id="errorBox"></div>

        <!-- Division 導覽列 -->
        <div class="div-nav" id="divNav"></div>

        <!-- 頁籤導覽 -->
        <div class="tab-nav" id="tabNav"></div>

        <!-- 排名內容 -->
        <div id="rankContent">
            <div class="loading"><span class="spinner-sm"></span> 載入排名數據...</div>
        </div>
    </div>

    <script>
        const API = '';
        const MATCH_ID = parseInt('{{MATCH_ID}}');
        let currentDivision = null;
        let currentTab = 'overall';
        let currentStage = null;
        let matchData = null;

        async function api(path) {
            const r = await fetch(API + path);
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        }

        function fmtScore(v) {
    v = parseFloat(v);
    return (v && v > 0) ? v.toFixed(4) : '—';
}
function fmtPct(v) {
    v = parseFloat(v);
    return (v && v > 0) ? v.toFixed(2) + '%' : '—';
}
function fmtHF(v) {
    v = parseFloat(v);
    return (v && v > 0) ? v.toFixed(4) : '—';
}

function showError(msg) {
            box.textContent = '❌ ' + msg;
            box.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorBox').style.display = 'none';
        }

        async function loadMatch() {
            try {
                const data = await api(`/api/matches/${MATCH_ID}`);
                matchData = data.match;
                document.getElementById('matchTitle').textContent =
                    `${matchData.name} (${matchData.date || ''})`;

                renderDivNav();
                // 預設第一個 Division
                if (matchData.divisions && matchData.divisions.length > 0) {
                    selectDivision(matchData.divisions[0]);
                } else {
                    document.getElementById('rankContent').innerHTML =
                        '<div class="no-data">📭 未有數據，請按「爬取最新數據」</div>';
                }
            } catch (e) {
                showError('載入比賽失敗: ' + e.message);
                document.getElementById('rankContent').innerHTML = '';
            }
        }

        function renderDivNav() {
            const nav = document.getElementById('divNav');
            nav.innerHTML = '';
            if (!matchData.divisions) return;
            matchData.divisions.forEach(div => {
                const btn = document.createElement('button');
                btn.className = 'div-btn' + (div === currentDivision ? ' active' : '');
                btn.textContent = div;
                btn.onclick = () => selectDivision(div);
                nav.appendChild(btn);
            });
        }

        function renderTabNav() {
            const nav = document.getElementById('tabNav');
            const tabs = [
                { id: 'overall', label: '🏆 Overall' },
                { id: 'category', label: '👥 Category' },
                { id: 'class', label: '📊 Class' },
                { id: 'stage', label: '🎯 Stage' },
            ];
            nav.innerHTML = '';
            tabs.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (t.id === currentTab ? ' active' : '');
                btn.textContent = t.label;
                btn.onclick = () => selectTab(t.id);
                nav.appendChild(btn);
            });
        }

        function selectDivision(div) {
            currentDivision = div;
            renderDivNav();
            renderTabNav();
            loadRankings();
        }

        function selectTab(tab) {
            currentTab = tab;
            currentStage = null;
            renderTabNav();
            loadRankings();
        }

        function selectStage(stage) {
            currentStage = stage;
            loadStageRankings();
        }

        async function loadRankings() {
            const content = document.getElementById('rankContent');
            content.innerHTML = '<div class="loading"><span class="spinner-sm"></span> 載入中...</div>';
            hideError();

            try {
                if (currentTab === 'overall') {
                    await loadOverall();
                } else if (currentTab === 'category') {
                    await loadCategory();
                } else if (currentTab === 'class') {
                    await loadClass();
                } else if (currentTab === 'stage') {
                    await loadStageList();
                }
            } catch (e) {
                showError('載入排名失敗: ' + e.message);
                content.innerHTML = '';
            }
        }

        // ----- OVERALL -----
        async function loadOverall() {
            const data = await api(`/api/matches/${MATCH_ID}/rankings?division=${currentDivision}&rank_type=overall`);
            const content = document.getElementById('rankContent');
            const rows = data.rankings;

            let html = `<div class="section-title">${currentDivision}</div>`;
            html += `<div class="rank-info">👤 ${rows.length} 位射手</div>`;
            html += `<div class="table-wrap"><table class="ranking">
                <thead><tr>
                    <th>Place</th><th>#</th><th>Shooter</th>
                    <th>Category</th><th>Class</th><th>Factor</th>
                    <th>Region</th><th>Total Score</th><th>Score %</th>
                </tr></thead><tbody>`;

            rows.forEach(r => {
                const pc = r.place <= 3 ? `place-${r.place}` : '';
                html += `<tr>
                    <td class="${pc}">${r.place}</td>
                    <td>${r.competitor_number}</td>
                    <td><strong>${r.name}</strong></td>
                    <td>${r.category || ''}</td>
                    <td>${r.class || ''}</td>
                    <td>${r.factor || ''}</td>
                    <td>${r.region || ''}</td>
                    <td><strong>${fmtScore(r.total_score)}</strong></td>
                    <td>${fmtPct(r.score_percent)}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            content.innerHTML = html;
        }

        // ----- CATEGORY -----
        async function loadCategory() {
            const data = await api(`/api/matches/${MATCH_ID}/rankings?division=${currentDivision}&rank_type=category`);
            const content = document.getElementById('rankContent');
            const groups = data.groups || [];

            if (groups.length === 0) {
                content.innerHTML = `<div class="section-title">${currentDivision} - Category</div>
                    <div class="no-data">📭 未有 Category 分組數據</div>`;
                return;
            }

            let html = `<div class="section-title">${currentDivision} - Category</div>`;
            for (const g of groups) {
                const rankings = data.rankings[g];
                if (!rankings || rankings.length === 0) continue;
                html += `<div class="cat-title">${currentDivision} - ${g} (${rankings.length})</div>`;
                html += `<div class="table-wrap"><table class="ranking">
                    <thead><tr>
                        <th>Place</th><th>#</th><th>Shooter</th>
                        <th>Category</th><th>Class</th><th>Factor</th>
                        <th>Region</th><th>Total Score</th><th>Score %</th>
                    </tr></thead><tbody>`;
                rankings.forEach(r => {
                    const pc = r.place <= 3 ? `place-${r.place}` : '';
                    html += `<tr>
                        <td class="${pc}">${r.place}</td>
                        <td>${r.competitor_number}</td>
                        <td><strong>${r.name}</strong></td>
                        <td>${r.category || ''}</td>
                        <td>${r.class || ''}</td>
                        <td>${r.factor || ''}</td>
                        <td>${r.region || ''}</td>
                        <td><strong>${fmtScore(r.total_score)}</strong></td>
                        <td>${fmtPct(r.score_percent)}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
            }
            content.innerHTML = html;
        }

        // ----- CLASS -----
        async function loadClass() {
            const data = await api(`/api/matches/${MATCH_ID}/rankings?division=${currentDivision}&rank_type=class`);
            const content = document.getElementById('rankContent');
            const groups = data.groups || [];

            if (groups.length === 0) {
                content.innerHTML = `<div class="section-title">${currentDivision} - Class</div>
                    <div class="no-data">📭 未有 Class 分組數據</div>`;
                return;
            }

            let html = `<div class="section-title">${currentDivision} - Class</div>`;
            for (const g of groups) {
                const rankings = data.rankings[g];
                if (!rankings || rankings.length === 0) continue;
                html += `<div class="cat-title">${currentDivision} - ${g} (${rankings.length})</div>`;
                html += `<div class="table-wrap"><table class="ranking">
                    <thead><tr>
                        <th>Place</th><th>#</th><th>Shooter</th>
                        <th>Category</th><th>Class</th><th>Factor</th>
                        <th>Region</th><th>Total Score</th><th>Score %</th>
                    </tr></thead><tbody>`;
                rankings.forEach(r => {
                    const pc = r.place <= 3 ? `place-${r.place}` : '';
                    html += `<tr>
                        <td class="${pc}">${r.place}</td>
                        <td>${r.competitor_number}</td>
                        <td><strong>${r.name}</strong></td>
                        <td>${r.category || ''}</td>
                        <td>${r.class || ''}</td>
                        <td>${r.factor || ''}</td>
                        <td>${r.region || ''}</td>
                        <td><strong>${fmtScore(r.total_score)}</strong></td>
                        <td>${fmtPct(r.score_percent)}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
            }
            content.innerHTML = html;
        }

        // ----- STAGE -----
        async function loadStageList() {
            const data = await api(`/api/matches/${MATCH_ID}/rankings?division=${currentDivision}&rank_type=stage`);
            const content = document.getElementById('rankContent');
            const stages = data.stages || [];

            if (stages.length === 0) {
                content.innerHTML = `<div class="section-title">${currentDivision} - Stage</div>
                    <div class="no-data">📭 未有 Stage 數據</div>`;
                return;
            }

            currentStage = stages[0];

            let html = `<div class="section-title">${currentDivision} - Stage</div>`;
            html += `<div class="stage-select">`;
            stages.forEach(s => {
                const active = s === currentStage ? ' active' : '';
                html += `<button class="stage-btn${active}" onclick="selectStage('${s}')">${s}</button>`;
            });
            html += `</div><div id="stageContent"><div class="loading"><span class="spinner-sm"></span> 載入中...</div></div>`;
            content.innerHTML = html;

            loadStageRankings();
        }

        async function loadStageRankings() {
            if (!currentStage) return;
            const content = document.getElementById('stageContent');
            if (!content) return;
            content.innerHTML = '<div class="loading"><span class="spinner-sm"></span> 載入中...</div>';

            try {
                const data = await api(`/api/matches/${MATCH_ID}/rankings?division=${currentDivision}&rank_type=stage&group_key=${encodeURIComponent(currentStage)}`);
                const rows = data.rankings || [];

                let html = `<div class="section-title">${currentDivision} - ${currentStage}</div>`;
                html += `<div class="rank-info">👤 ${rows.length} 位射手</div>`;
                html += `<div class="table-wrap"><table class="ranking">
                    <thead><tr>
                        <th>Place</th><th>#</th><th>Shooter</th>
                        <th>Category</th><th>Class</th><th>Factor</th>
                        <th>Hit Factor</th><th>Stage Score</th>
                    </tr></thead><tbody>`;

                rows.forEach(r => {
                    const pc = r.place <= 3 ? `place-${r.place}` : '';
                    html += `<tr>
                        <td class="${pc}">${r.place}</td>
                        <td>${r.competitor_number}</td>
                        <td><strong>${r.name}</strong></td>
                        <td>${r.category || ''}</td>
                        <td>${r.class || ''}</td>
                        <td>${r.factor || ''}</td>
                        <td><strong>${fmtHF(r.score_percent)}</strong></td>
                        <td>${fmtScore(r.total_score)}</td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = `<div class="error-box" style="display:block;">❌ ${e.message}</div>`;
            }
        }

        // ----- SCRAPE -----
        async function scrapeMatch() {
            const btn = document.querySelector('.btn-scrape');
            btn.textContent = '⏳ 爬取中...';
            btn.disabled = true;

            try {
                const result = await api(`/api/matches/${MATCH_ID}/scrape`);
                if (result.status === 'success') {
                    // 重新載入
                    await loadMatch();
                } else {
                    showError(result.error || '爬取失敗');
                }
            } catch (e) {
                showError('爬取請求失敗: ' + e.message);
            } finally {
                btn.textContent = '📡 爬取最新數據';
                btn.disabled = false;
            }
        }

        // 啟動
        loadMatch();
    </script>
</body>
</html>
