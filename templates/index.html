<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPSC 實時排名系統</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #222;
            min-height: 100vh;
        }
        .header {
            background: #1a1a2e;
            color: #fff;
            padding: 20px 24px;
            text-align: center;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header p { font-size: 13px; color: #aaa; margin-top: 4px; }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        .match-card {
            display: block;
            background: #fff;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            color: #222;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transition: box-shadow 0.2s;
        }
        .match-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
        .match-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
        }
        .match-card .match-name { font-size: 16px; font-weight: 600; }
        .match-card .match-date { font-size: 13px; color: #888; }
        .match-card .match-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .match-card .status-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .status-completed { background: #d4edda; color: #155724; }
        .status-live { background: #fff3cd; color: #856404; }
        .status-badge.live { background: #cce5ff; color: #004085; }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-warning { background: #e67e22; color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .scrape-status {
            background: #eef;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .scrape-status.active { display: block; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error-banner {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #aaa;
            border-top-color: #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            text-align: center;
            padding: 24px;
            color: #aaa;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 18px; }
            .match-card { padding: 14px 16px; }
            .match-card .match-name { font-size: 14px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 IPSC 實時排名系統</h1>
        <p>Hong Kong IPSC / Action Air 比賽即時排名查閱</p>
    </div>
    <div class="container">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="refreshMatches()">🔄 重新整理</button>
            <button class="btn btn-warning" onclick="scrapeAll()">📡 爬取最新數據</button>
            <button class="btn btn-sm" onclick="checkStatus()" style="background:#eee;">📊 狀態</button>
        </div>
        <div class="scrape-status" id="scrapeStatus"></div>
        <div class="error-banner" id="errorBanner"></div>
        <div class="loading" id="loading">載入中...</div>
        <div id="matchList"></div>
    </div>
    <div class="footer">
        Data source: <a href="https://hkg.as.ipscess.org/portal" target="_blank" style="color:#888;">hkg.as.ipscess.org</a>
        · 第三方非官方排名系統
    </div>

    <script>
        const API = '';
        let statusCheckTimer = null;
        let autoRefreshTimer = null;

        async function api(path) {
            const r = await fetch(API + path);
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        }

        async function refreshMatches() {
            const list = document.getElementById('matchList');
            const error = document.getElementById('errorBanner');
            error.style.display = 'none';
            try {
                const data = await api('/api/matches');
                list.innerHTML = data.matches.map(m => {
                    const shooterCount = m.shooter_count || 0;
                    let statusClass, statusLabel;
                    if (m.is_completed) {
                        statusClass = 'status-completed';
                        statusLabel = '✅ 已完成';
                    } else if (shooterCount > 0) {
                        statusClass = 'status-live';
                        statusLabel = '🟡 進行中';
                    } else {
                        statusClass = '';
                        statusLabel = '🔴 未開始';
                    }
                    const link = `/match/${m.id}`;
                    return `<a href="${link}" class="match-card">
                        <div class="top-row">
                            <span class="match-name">${m.name}</span>
                            <span class="match-date">${m.date || ''}</span>
                        </div>
                        <div class="match-meta">
                            ${m.venue || ''} ${m.level ? '· ' + m.level : ''}
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                            <span style="margin-left:12px;color:#666;">👤 ${shooterCount} 位射手</span>
                        </div>
                    </a>`;
                }).join('');
                loading.style.display = 'none';
            } catch (e) {
                loading.style.display = 'none';
                error.textContent = '❌ 載入失敗: ' + e.message;
                error.style.display = 'block';
            }
        }

        async function scrapeAll() {
            const statusDiv = document.getElementById('scrapeStatus');
            statusDiv.className = 'scrape-status active';
            statusDiv.innerHTML = '<span class="spinner"></span> 開始爬取所有比賽...';

            try {
                const r = await fetch(API + '/api/scrape/run', { method: 'POST' });
                const data = await r.json();
                if (data.status === 'started') {
                    // 輪詢狀態
                    if (statusCheckTimer) clearInterval(statusCheckTimer);
                    statusCheckTimer = setInterval(async () => {
                        try {
                            const st = await api('/api/scrape/status');
                            statusDiv.innerHTML = '<span class="spinner"></span> ' + st.progress;
                            if (!st.running) {
                                clearInterval(statusCheckTimer);
                                statusDiv.innerHTML = '✅ ' + (st.progress || '完成');
                                refreshMatches();
                            }
                        } catch (e) {
                            clearInterval(statusCheckTimer);
                            statusDiv.innerHTML = '❌ 狀態查詢錯誤';
                        }
                    }, 2000);
                } else {
                    statusDiv.innerHTML = '⚠️ ' + (data.message || '未知');
                }
            } catch (e) {
                statusDiv.innerHTML = '❌ ' + e.message;
            }
        }

        async function checkStatus() {
            try {
                const st = await api('/api/scrape/status');
                const statusDiv = document.getElementById('scrapeStatus');
                statusDiv.className = 'scrape-status active';
                statusDiv.innerHTML = st.running
                    ? '<span class="spinner"></span> ' + (st.progress || '爬取進行中...')
                    : '⏸️ 閒置中。上次: ' + (st.last_run ? new Date(st.last_run).toLocaleString('zh-HK') : '從未');
            } catch (e) {
                document.getElementById('errorBanner').textContent = '❌ ' + e.message;
                document.getElementById('errorBanner').style.display = 'block';
            }
        }

        refreshMatches();

        // 自動刷新主頁（每 30 秒）
        autoRefreshTimer = setInterval(refreshMatches, 30000);
    </script>
</body>
</html>
